<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Album</title>
    <meta name="description" content="Discover a random music album with a single click.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <main class="container">
        <div class="glass-panel">
            <h1 class="title">Discover Your Next Obsession</h1>
            <p class="subtitle">Click below to uncover a masterpiece.</p>
            <button id="randomize-btn" class="primary-button">
                <span class="button-content">Random album</span>
                <div class="button-glow"></div>
            </button>
            <div id="result-container" class="result-container hidden">
                <!-- Result placeholder -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
